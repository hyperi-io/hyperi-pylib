# Project:   hyperi-pylib
# File:      docker-compose.openbao.yml
# Purpose:   Local OpenBao (Vault-compatible) for integration tests
# Language:  YAML
#
# License:   FSL-1.1-ALv2
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Used by tests/conftest.py's openbao fixture cascade. We pin to the upstream
# hashicorp/vault image because OpenBao's Docker image is functionally identical
# for the KV v2 surface we test, and hashicorp/vault has wider mirror coverage.

services:
  vault:
    image: hashicorp/vault:1.18
    container_name: hyperi-pylib-openbao
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: hyperi-pylib-test-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 2s
      timeout: 2s
      retries: 15
