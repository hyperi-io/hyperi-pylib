# Project:   hyperi-pylib
# File:      docker-compose.openbao.yml
# Purpose:   Local OpenBao for integration tests
# Language:  YAML
#
# License:   BUSL-1.1
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Used by tests/conftest.py's openbao fixture cascade. We test against the
# actual OpenBao image — testing OpenBao support against HashiCorp Vault
# defeats the purpose of the BSL-fork.

services:
  openbao:
    image: openbao/openbao:2
    container_name: hyperi-pylib-openbao
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: hyperi-pylib-test-root
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      BAO_ADDR: http://0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 2s
      timeout: 2s
      retries: 15
