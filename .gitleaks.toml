[extend]
# Use the default gitleaks config as base
useDefault = true

# Allowlist for historical commits containing secrets in deleted/backup files
# These tokens have been rotated and the files are no longer in use
[allowlist]
description = "hyperi-pylib historical false positives"

# Commits containing old backup files with now-rotated credentials
commits = [
    "12e97bf5520ca190c8e1f5988f2efef39b7e9258",  # backup/pip.backup/pip.conf
    "60ee2f9e6202c97833c8073b3ca8ad0e6eb7ab7e",  # .env.backup
    "15effabd30fc02393326a0ef16d931c3acbe8092",  # .pip/pip.conf
    "10641cc259be3ea0eec63736d7494dbe5a553b7a",  # .pip/pip.conf
]

# Paths to ignore (backup files no longer in use, test fixtures with fake secrets)
paths = [
    '''backup/.*''',
    '''\.env\.backup''',
    '''\.pip/pip\.conf''',
    '''tests/unit/test_anonymizer\.py''',         # Fake API keys for PII anonymization tests
    '''tests/unit/test_logger_filters\.py''',     # Fake API keys for log masking tests
    '''tests/unit/test_logger_secrets_leak\.py''', # Fake API keys for L1 secret-leak scrubber tests
    '''tests/unit/test_scrub_gitleaks_toml\.py''', # Fake API keys for L1 gitleaks-TOML scrubber tests
    '''tests/unit/test_scrub_parity_fixtures\.py''', # Fake API keys for L3 parity fixture tests
    '''docs/SERVICE-ACCESS\.md''',                # Example credentials in documentation (test environment)
]

# Regex patterns that are test fixtures (fake secrets for testing)
regexes = [
    '''sk-proj-abc123def456ghi789''',
    '''secret_abc123def456''',
    '''sk_live_51Hqx2ABCDEFGabcdefg''',
    '''jwt_secret_xyz789''',
    '''sk-1234567890''',
    '''sk-123_ABC-xyz''',
]
