# National-ID validator registry — seeded from python-stdnum.
# Source of truth for L3 PII detection metadata across both
# pylib and rustlib (see hyperi-ai/standards/specs/log-scrub-spec.md).
#
# To regenerate after a python-stdnum release:
#   python tools/seed_national_ids_from_stdnum.py \
#       --output standards/patterns/national_ids.toml \
#       --update-only
#
# Hand-curated fields (enabled, context_required, keywords,
# detection_regex) survive re-seeding.

