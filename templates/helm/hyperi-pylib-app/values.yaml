# Default values for hyperi-pylib-app
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Application configuration
app:
  name: my-app
  type: api  # api, daemon, or mcp
  version: "1.0.0"
  profile: prod  # dev, docker, or prod

# Replica configuration
replicaCount: 3

# Image configuration
image:
  repository: my-app
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL

# Service configuration
service:
  type: ClusterIP
  # API applications
  http:
    enabled: true
    port: 80
    targetPort: 8000
  # Health checks (all application types)
  health:
    enabled: true
    port: 8080
    targetPort: 8080
  # Metrics (all application types)
  metrics:
    enabled: true
    port: 9090
    targetPort: 9090

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: my-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: my-app-tls
  #    hosts:
  #      - my-app.example.com

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Health check configuration
healthCheck:
  enabled: true
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
  startup:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# KEDA autoscaling (mutually exclusive with HPA)
keda:
  enabled: false
  minReplicaCount: 2
  maxReplicaCount: 20
  pollingInterval: 30
  cooldownPeriod: 300
  triggers: []
  # Example Prometheus trigger:
  # - type: prometheus
  #   metadata:
  #     serverAddress: http://prometheus:9090
  #     metricName: http_requests_rate
  #     query: rate(http_requests_total{app="my-app"}[1m])
  #     threshold: "100"

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Environment variables
env: []
# - name: LOG_LEVEL
#   value: INFO
# - name: DATABASE_HOST
#   valueFrom:
#     configMapKeyRef:
#       name: my-app-config
#       key: DATABASE_HOST

# Environment variables from ConfigMap
envFrom: []
# - configMapRef:
#     name: my-app-config
# - secretRef:
#     name: my-app-secrets

# Prometheus ServiceMonitor
prometheus:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
    labels: {}

# ConfigMap data
configMap:
  enabled: false
  data: {}
  # DATABASE_HOST: "postgres.default.svc.cluster.local"
  # REDIS_URL: "redis://redis.default.svc.cluster.local:6379"

# Secret data (use external-secrets or sealed-secrets in production)
secret:
  enabled: false
  data: {}
  # DATABASE_PASSWORD: "changeme"
  # API_KEY: "changeme"
