{{- if or .Values.service.http.enabled .Values.service.health.enabled .Values.service.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hyperlib-app.fullname" . }}
  labels:
    {{- include "hyperlib-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "hyperlib-app.selectorLabels" . | nindent 4 }}
  ports:
  {{- if and (eq .Values.app.type "api") .Values.service.http.enabled }}
  - name: http
    port: {{ .Values.service.http.port }}
    targetPort: http
    protocol: TCP
  {{- end }}
  {{- if .Values.service.health.enabled }}
  - name: health
    port: {{ .Values.service.health.port }}
    targetPort: health
    protocol: TCP
  {{- end }}
  {{- if .Values.service.metrics.enabled }}
  - name: metrics
    port: {{ .Values.service.metrics.port }}
    targetPort: metrics
    protocol: TCP
  {{- end }}
{{- end }}
