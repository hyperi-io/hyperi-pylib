project:
  languages:
  - python
tests:
  required: false
  checklist:
  - pytest_tests
  - ruff_lint
  - black_format_check
  - mypy_type_check
  min_coverage: 80
  fail_fast: false
nuitka:
  enabled: false  # Uses python.build_type when enabled
  triggers:
    on_release_tags: true
    on_pull_requests: false
    on_push_to_main: false
  protection_level: recommended
  platforms:
    linux_x64: true
    linux_arm64: true
    macos_arm64: false
  buildjet:
    enabled: true
  cirrus:
    enabled: true
  publish:
    enabled: true
    repository: hypersec-nuitka-binaries
release:
  build_local: false
publish:
  verify_enabled: false
  verify_timeout: 600
package: null
python:
  source_root: src/hs_lib
  build_type: package  # package (library) or app (binary)
security:
  ignore_vulns:
  - PYSEC-2022-42969
ai:
  dynaconf_merge: true
  merge_mode: merge
ci:
  version: latest
