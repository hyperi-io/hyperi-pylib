# Project:   hyperi-pylib
# File:      .releaserc.yaml
# Purpose:   Semantic release configuration
#
# License:   FSL-1.1-ALv2
# Copyright: (c) 2026 HYPERI PTY LIMITED

branches:
  - main

tagFormat: "v${version}"

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch
        - type: sec
          release: patch
        - type: hotfix
          release: patch
        - type: security
          release: patch
        - type: docs
          release: false
        - type: test
          release: false
        - type: refactor
          release: false
        - type: style
          release: false
        - type: build
          release: false
        - type: ci
          release: false
        - type: chore
          release: false
        - type: deps
          release: false
        - type: revert
          release: false
        - type: wip
          release: false
        - type: cleanup
          release: false
        - type: data
          release: false
        - type: debt
          release: false
        - type: design
          release: false
        - type: infra
          release: false
        - type: meta
          release: false
        - type: ops
          release: false
        - type: review
          release: false
        - type: spike
          release: false
        - type: ui
          release: false

  - "@semantic-release/release-notes-generator"

  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md

  - - "@semantic-release/exec"
    - prepareCmd: >-
        python3 -c "from pathlib import Path; import re;
        v='${nextRelease.version}';
        Path('VERSION').write_text(v+'\n');
        pp=Path('pyproject.toml'); t=pp.read_text();
        t=re.sub(r'^version\s*=\s*\"[^\"]*\"',
        'version = \"'+v+'\"', t, count=1, flags=re.MULTILINE);
        pp.write_text(t);
        ip=Path('src/hyperi_pylib/__init__.py'); s=ip.read_text();
        s=re.sub(r'^__version__\s*=\s*\"[^\"]*\"',
        '__version__ = \"'+v+'\"', s, count=1, flags=re.MULTILINE);
        ip.write_text(s)"

  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
        - VERSION
        - pyproject.toml
        - src/hyperi_pylib/__init__.py
      message: "chore: version ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
