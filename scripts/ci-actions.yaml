ci:
  venv_name: ".venv-ci"
  preferred_python: "3.11"
  min_python: "3.11"

dependencies:
  # System-wide tools (require user permission/sudo)
  semantic-release:
    macos:
      - cmdline: "npm install -g semantic-release"
        type: "system"
    linux-apt:
      - cmdline: "npm install -g semantic-release"
        type: "system"
    linux-dnf:
      - cmdline: "npm install -g semantic-release"
        type: "system"
    windows:
      - cmdline: "npm install -g semantic-release"
        type: "system"

# Python tools installation policy:
# - ALL pip installations go to .venv-ci automatically
# - NO restrictions on what can be installed
# - Scripts can freely pip install any needed tools
# - System Python is NEVER used for pip operations

logging:
  file_env_var: CI_LOG_FILE
  structured_env_var: CI_LOG_STRUCTURED
