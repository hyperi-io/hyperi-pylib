# Allowed character and emoji configuration

# Regex for discouraged characters: everything outside ASCII + box-drawing + approved emojis
allowed_pattern: >
  (?u)[^\x00-\x7F\u2500-\u257F\u2580-\u259F\u2190-\u21FF\u25A0-\u25FF
  \u2705\u274C\u26A0\u2139\u1F41E\u23F3\u1F6AB\u1F7E2\u1F534
  \U0001F512\u26A1\u1F197\u274E\u2B06\u2B07\u2744\u2747\u26D4\u1F501\u1F4A5]

# Regex for approved emoji only
emoji_pattern: >
  (?u)[рҹ’ҘвқҢвҡ пёҸвң…в„№пёҸрҹҗһвҸірҹҡ«рҹҹўрҹ”ҙрҹ”’вҡЎвһӨвһ”вҶ’вң”вң–в–Ів–ј]
  
include_globs:
  - "*.py"
  - "*.yaml"
  - "*.yml"
  - "*.md"

exclude_dirs:
  - node_modules
  - dist
  - build
  - .venv
  - .tox
  - .mypy_cache
  - .git
