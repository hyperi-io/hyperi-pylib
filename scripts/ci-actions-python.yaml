# Python-specific CI Actions Configuration
# Extends the core ci-actions.yaml with Python project variations

version: "1.0"
# This file is standalone in deployed projects

# Python-specific settings
settings:
  python_version: "3.11"
  nox_sessions: ["tests", "lint", "build"]
  
# Python project type detection
project_types:
  cli:
    indicators:
      - file: "src/*/cli.py"
      - pattern: "[project.scripts]" 
        in: "pyproject.toml"
    group: "python-cli"
  
  package:
    indicators:
      - file: "src/*/client.py"
      - pattern: "build.*twine"
        in: "pyproject.toml"
    group: "python-package"
  
  api:
    indicators:
      - file: "src/*/api.py"
      - pattern: "fastapi"
        in: "pyproject.toml"
    group: "python-api"
  
  daemon:
    indicators:
      - file: "src/*/daemon.py"
      - pattern: "asyncio.*daemon"
        in: "pyproject.toml"
    group: "python-daemon"

# Python-specific actions
actions:
  python-nox:
    description: "Run nox sessions"
    context: ["local", "cloud"]
    default: "local"
    steps:
      - name: "nox-tests"
        cmdline: "nox -s tests"
        env:
          HSF_IN_CI_VENV: "1"
        when: "file:noxfile.py"
      
      - name: "nox-lint"
        cmdline: "nox -s lint"
        env:
          HSF_IN_CI_VENV: "1"
        when: "file:noxfile.py"
      
      - name: "nox-build"
        cmdline: "nox -s build"
        env:
          HSF_IN_CI_VENV: "1"
        when: "file:noxfile.py AND group:python-package"
  
  python-security:
    description: "Security scanning for Python"
    context: ["local", "cloud"]
    default: "local"
    steps:
      - name: "bandit"
        cmdline: "bandit -r src/"
        when: "file:src/"
      
      - name: "safety"
        cmdline: "safety check"
      
      - name: "pip-audit"
        cmdline: "pip-audit"
  
  python-coverage:
    description: "Test coverage reporting"
    context: ["local", "cloud"]
    default: "local"
    steps:
      - name: "coverage-run"
        cmdline: "pytest --cov=src --cov-report=term-missing --cov-report=html"
        when: "file:tests/"
      
      - name: "coverage-check"
        cmdline: "coverage report --fail-under=80"
        when: "env:HSF_ENFORCE_COVERAGE=true"

# Enhanced Python groups with variations
groups:
  python-base:
    description: "Base Python CI"
    extends: "base"
    actions:
      - python-test
      - python-nox
      - python-security
  
  python-cli:
    description: "Python CLI project"
    extends: "python-base"
    actions:
      - python-build
    optional:
      - python-coverage
      - publish-pypi
  
  python-package:
    description: "Python package/library"
    extends: "python-base"
    actions:
      - python-build
      - python-coverage
      - publish-pypi
    env:
      HSF_ENFORCE_COVERAGE: "true"
  
  python-api:
    description: "Python API service"
    extends: "python-base"
    actions:
      - python-build
      - python-coverage
    optional:
      - publish-docker
      - publish-pypi
    env:
      HSF_ENFORCE_COVERAGE: "true"
  
  python-daemon:
    description: "Python daemon service"
    extends: "python-api"
    actions:
      - python-build
      - publish-docker

# Workflow variations for Python
workflows:
  python-pr:
    description: "Python pull request checks"
    triggers:
      - pull_request: ["main", "develop"]
    jobs:
      test:
        runs-on: "ubuntu-latest"
        strategy:
          matrix:
            python-version: ["3.11", "3.12"]
        steps:
          - checkout: { fetch-depth: 0 }
          - setup-python: "${{ matrix.python-version }}"
          - install-deps: "pip install -e .[dev]"
          - run-tests: "nox"
  
  python-release:
    description: "Python release workflow"
    triggers:
      - push:
          tags: ["v*"]
    jobs:
      release:
        runs-on: "ubuntu-latest"
        steps:
          - checkout: { fetch-depth: 0 }
          - setup-python: "3.11"
          - build: "python -m build"
          - publish-pypi:
              if: "env.HSF_PUBLISH_PYPI == 'true'"
              run: "twine upload dist/*"
          - publish-jfrog:
              if: "env.HSF_PUBLISH_JFROG == 'true'"
              run: |
                twine upload \
                  --repository-url $JFROG_PYPI_URL \
                  --username $JFROG_USERNAME \
                  --password $JFROG_PASSWORD \
                  dist/*

# Python-specific environment mappings
env_mappings:
  PYTHONPATH:
    local: "src:tests"
    cloud: "src:tests"
  
  HSF_IN_CI_VENV:
    local: "1"
    cloud: "0"  # GitHub Actions doesn't use our venv
  
  PIP_INDEX_URL:
    local: "${PIP_INDEX_URL:-https://pypi.org/simple}"
    cloud: "${JFROG_PYPI_URL:-https://pypi.org/simple}"

# Override rules for Python projects
overrides:
  # Enable all Python testing
  - env: "HSF_PYTHON_FULL_TEST=true"
    enable:
      - "python-nox"
      - "python-security"
      - "python-coverage"
  
  # Skip slow tests
  - env: "HSF_QUICK_TEST=true"
    disable:
      - "python-security"
      - "python-coverage"
  
  # Force PyPI publishing
  - env: "HSF_PUBLISH_PYPI=true"
    enable:
      - "publish-pypi"
    set:
      default_mode: "cloud"
