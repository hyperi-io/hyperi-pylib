[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hyperlib"
version = "1.1.1"
description = "HyperSec shared library for Python projects"
readme = "README.md"
authors = [
    {name = "HyperSec Team", email = "dev@hypersec.io"},
]
maintainers = [
    {name = "HyperSec Team", email = "dev@hypersec.io"},
]
license = {text = "HyperSec EULA"}
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: OS Independent",
]
keywords = ["hypersec", "library", "utilities", "logging", "configuration"]
dependencies = [
    # Core dependencies for all project types
    "dynaconf>=3.2.0",  # Configuration management
    "loguru>=0.7.0",    # Professional logging
    "pyyaml>=6.0.0",    # YAML configuration parsing
    # Package has minimal dependencies by default
    # Add your package-specific dependencies here
    "pydantic>=2.0.0",  # Data validation
    "aiofiles>=23.0.0", # Async file operations
    "httpx>=0.24.0",    # HTTP client
    "tenacity>=8.0.0",  # Retry logic
    "psutil>=5.9.0",    # System and process utilities
]

[project.optional-dependencies]
enhanced = [
    # Add optional enhanced dependencies here
    # "pandas>=2.0.0",    # Data analysis
    # "requests>=2.31.0",  # HTTP client
    # "numpy>=1.24.0",     # Scientific computing
]
dev = [
    "nox>=2024.0.0",         # Task automation and testing
    "pytest>=8.0.0",         # Modern test framework
    "pytest-cov>=5.0.0",     # Test coverage reporting
    "ruff>=0.1.0",           # Fast Python linter (replaces flake8)
    "black>=24.0.0",         # Code formatting
    "mypy>=1.8.0",           # Static type checking
    "vermin>=1.6.0",         # Python version detection and automation
    "python-dotenv>=1.0.0",  # Environment configuration
    "pyyaml>=6.0.1",         # YAML configuration support
    "pre-commit>=3.0.0",     # Git pre-commit hooks
    "isort>=5.12.0",         # Import sorting
    "requests>=2.31.0",      # For download_datasets script
    "build>=1.0.0",          # Build backend for packages
    "twine>=5.0.0",          # PyPI upload tool
]
docs = [
    "sphinx>=8.0.0",          # Documentation generator
    "sphinx-rtd-theme>=3.0.0", # Read the Docs theme
    "myst-parser>=3.0.0",     # Markdown parser for Sphinx
    "sphinx-autobuild>=2024.0.0", # Live reload during development
]

[project.urls]
Homepage = "https://github.com/hypersec-io/hyperlib"
Documentation = "https://hypersec-io.github.io/hyperlib/"
Repository = "https://github.com/hypersec-io/hyperlib"
"Bug Reports" = "https://github.com/hypersec-io/hyperlib/issues"
Changelog = "https://github.com/hypersec-io/hyperlib/blob/main/CHANGELOG.md"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["hyperlib*"]
namespaces = false

[tool.setuptools.package-data]
hyperlib = ["py.typed"]

[tool.semantic_release]
version_variables = [
    "src/hyperlib/__init__.py:__version__",
    "pyproject.toml:version",
]
version_toml = [
    "pyproject.toml:project.version",
]
branch = "main"
build_command = "python -m build"
upload_to_release = true
upload_to_pypi = false
commit_message = "chore: release {version} [skip ci]"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra -q --strict-markers --cov=hyperlib --cov-report=term-missing"
pythonpath = ["src"]
markers = [
    "e2e: end-to-end integration tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["src/hyperlib"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
target-version = "py311"
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ARG",  # flake8-unused-arguments
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function calls in argument defaults
    "C901",  # Too complex
    "W191",  # Indentation contains tabs
]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.black]
line-length = 120
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_any_unimported = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
check_untyped_defs = true
strict_optional = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.bandit]
exclude_dirs = ["tests", "scripts"]
skips = ["B101", "B601"]

[tool.vermin]
targets = ["3.11"]
no_tips = true