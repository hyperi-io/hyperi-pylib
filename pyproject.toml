[build-system]
requires = [
    "setuptools>=64",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "hyperlib"
version = "2.8.3"
description = "Enterprise infrastructure for containerized Python applications - configuration, logging, timeouts, database, metrics, and application framework"
readme = "README.md"
authors = [
    { name = "HyperSec Team", email = "dev@hypersec.io" },
]
maintainers = [
    { name = "HyperSec Team", email = "dev@hypersec.io" },
]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: System :: Monitoring",
    "Topic :: System :: Logging",
]
keywords = [
    "hypersec",
    "enterprise",
    "containerization",
    "kubernetes",
    "docker",
    "logging",
    "configuration",
    "prometheus",
    "metrics",
    "database",
    "application-framework",
    "fastapi",
]
dependencies = [
    "dynaconf>=3.2.12",
    "loguru>=0.7.3",
    "pyyaml>=6.0.3",
    "psutil>=7.1.3",
    "mergedeep>=1.3.4",
    "tomli-w>=1.0.0",
]

[project.license]
text = "HyperSec EULA"

[project.optional-dependencies]
api = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
]
cli = [
    "typer[all]>=0.12.0",
]
metrics = [
    "prometheus-client>=0.19.0",
]
opentelemetry = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp>=1.20.0",
    "opentelemetry-exporter-prometheus>=0.41b0",
]
database = []
presidio = [
    "presidio-analyzer>=2.2.0",
    "presidio-anonymizer>=2.2.0",
]
enhanced = []
dev = [
    "setuptools>=70.0.0",
    "wheel>=0.42.0",
    "build>=1.0.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "black>=24.0.0",
    "isort>=5.12.0",
    "pyright>=1.1.0",
    "bandit[toml]>=1.7.0",
    "pip-audit>=2.6.0",
    "interrogate>=1.5.0",
    "vulture>=2.7.0",
    "vermin>=1.6.0",
    "twine>=5.0.0",
    "python-semantic-release>=9.0.0",
    "mergedeep>=1.3.4",
    "pycryptodomex>=3.20.0",
    "pre-commit>=3.0.0",
    "pytest>=8.0",
    "pytest-cov",
    "black",
    "ruff",
    "isort",
    "mypy",
    "bandit",
    "pip-audit",
    "interrogate",
    "vulture",
]
docs = [
    "sphinx>=7.0.0,<8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "myst-parser>=3.0.0",
    "sphinx-autobuild>=2024.0.0",
]

[project.urls]
Homepage = "https://github.com/hypersec-io/hyperlib"
Documentation = "https://hypersec-io.github.io/hyperlib/"
Repository = "https://github.com/hypersec-io/hyperlib"
"Bug Reports" = "https://github.com/hypersec-io/hyperlib/issues"
Changelog = "https://github.com/hypersec-io/hyperlib/blob/main/CHANGELOG.md"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = [
    "src",
]
include = [
    "hyperlib*",
]
namespaces = false

[tool.setuptools.package-data]
hyperlib = [
    "py.typed",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = [
    "tests",
]
addopts = "-ra -q --strict-markers --log-file=tests/logs/pytest/hyperlib.log --log-file-level=DEBUG"
pythonpath = [
    "src",
]
log_cli = true
log_cli_level = "INFO"
log_file = "tests/logs/pytest/hyperlib.log"
log_file_level = "DEBUG"
log_file_format = "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d - %(message)s"
log_file_date_format = "%Y-%m-%dT%H:%M:%S"
markers = [
    "unit: fast unit tests (no external dependencies)",
    "integration: integration tests (Docker required)",
    "e2e: end-to-end tests (Minikube/K8s required)",
    "unit: unit tests",
    "integration: integration tests",
    "e2e: end-to-end tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = [
    "src/hyperlib",
]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
target-version = "py311"
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "ARG",
    "SIM",
]
ignore = [
    "ARG001",
    "ARG002",
    "B904",
    "E402",
    "E722",
    "SIM105",
    "F401",
    "TRY300",
    "F821",
    "E501",
    "B008",
    "B017",  # pytest.raises(Exception) is acceptable for generic error testing
    "B007",  # Loop variables not used in body (common in test cases)
    "B028",  # warnings.warn stacklevel (not always needed)
    "C901",
    "E741",  # Ambiguous variable names (l, I, O) - acceptable in comprehensions
    "F601",  # Duplicate dict keys (handled by type checker)
    "UP035",  # typing.Dict -> dict (can be enabled when ready to modernize all type hints)
    "SIM108",  # Ternary operator suggestions (readability preference)
    "W191",
]
fixable = [
    "ALL",
]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.black]
line-length = 120
target-version = [
    "py311",
]
include = "\\.pyi?$"
extend-exclude = "/(\n  # directories\n  \\.eggs\n  | \\.git\n  | \\.hg\n  | \\.mypy_cache\n  | \\.tox\n  | \\.venv\n  | build\n  | dist\n)/\n"

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disallow_any_unimported = false
no_implicit_optional = false
warn_redundant_casts = false
warn_unused_ignores = false
warn_no_return = false
check_untyped_defs = false
strict_optional = false
ignore_missing_imports = true
overrides = [
    { module = "tests.*", ignore_errors = true },
    { module = "ci.*", ignore_errors = true },
]

[tool.bandit]
exclude_dirs = [
    "tests",
    "ci",
    ".venv",
]
skips = [
    "B101",
    "B601",
]

[tool.vermin]
targets = [
    "3.11",
]
no_tips = true

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
]
version_variables = [
    "src/hyperlib/__init__.py:__version__",
]
build_command = ".venv/bin/python ci/modules/python/tools/write-version.py && git add VERSION && rm -rf dist build src/*.egg-info && .venv/bin/python -m build"
major_on_zero = true
tag_format = "v{version}"
commit_message = "chore(release): {version}"

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.changelog]
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
keep_trailing_newline = true

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.commit_parser_options]
allowed_tags = [
    "feat",
    "fix",
    "perf",
    "refactor",
    "style",
    "test",
    "build",
    "ci",
    "docs",
    "chore",
]
minor_tags = [
    "feat",
]
patch_tags = [
    "fix",
    "perf",
]

[[tool.uv.index]]
name = "jfrog"
url = "https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local/simple"
explicit = true

[tool.uv.sources.nuitka]
index = "jfrog"