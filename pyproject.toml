[build-system]
requires = [
    "setuptools>=64",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "hyperlib"
version = "1.5.2"
description = "HyperSec shared library for Python projects"
readme = "README.md"
authors = [
    { name = "HyperSec Team", email = "dev@hypersec.io" },
]
maintainers = [
    { name = "HyperSec Team", email = "dev@hypersec.io" },
]
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: OS Independent",
]
keywords = [
    "hypersec",
    "library",
    "utilities",
    "logging",
    "configuration",
]
dependencies = [
    "dynaconf>=3.2.11",
    "loguru>=0.7.3",
    "pyyaml>=6.0.3",
    "pydantic>=2.0.0",
    "aiofiles>=23.0.0",
    "httpx>=0.24.0",
    "tenacity>=8.0.0",
    "psutil>=7.1.0",
]

[project.license]
text = "HyperSec EULA"

[project.optional-dependencies]
enhanced = []
dev = [
    "nox>=2024.0.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.1.0",
    "black>=24.0.0",
    "mypy>=1.8.0",
    "vermin>=1.6.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.1",
    "pre-commit>=3.0.0",
    "isort>=5.12.0",
    "requests>=2.31.0",
    "build>=1.0.0",
    "twine>=5.0.0",
    "tomli-w>=1.0.0",
]
docs = [
    "sphinx>=8.0.0",
    "sphinx-rtd-theme>=3.0.0",
    "myst-parser>=3.0.0",
    "sphinx-autobuild>=2024.0.0",
]

[project.urls]
Homepage = "https://github.com/hypersec-io/hyperlib"
Documentation = "https://hypersec-io.github.io/hyperlib/"
Repository = "https://github.com/hypersec-io/hyperlib"
"Bug Reports" = "https://github.com/hypersec-io/hyperlib/issues"
Changelog = "https://github.com/hypersec-io/hyperlib/blob/main/CHANGELOG.md"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = [
    "src",
]
include = [
    "hyperlib*",
]
namespaces = false

[tool.setuptools.package-data]
hyperlib = [
    "py.typed",
]

[tool.semantic_release]
version_variables = [
    "src/hyperlib/__init__.py:__version__",
    "pyproject.toml:version",
]
version_toml = [
    "pyproject.toml:project.version",
]
branch = "main"
build_command = ".venv-ci/bin/python -m build"
upload_to_release = true
upload_to_pypi = false
commit_message = "chore: release {version} [skip ci]"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = [
    "tests",
]
addopts = "-ra -q --strict-markers"
pythonpath = [
    "src",
]
markers = [
    "e2e: end-to-end integration tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = [
    "src/hyperlib",
]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
target-version = "py311"
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "ARG",
    "SIM",
]
ignore = [
    "ARG001",
    "ARG002",
    "B904",
    "E402",
    "E722",
    "SIM105",
    "F401",
    "TRY300",
    "F821",
    "E501",
    "B008",
    "C901",
    "W191",
]
fixable = [
    "ALL",
]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.black]
line-length = 120
target-version = [
    "py311",
]
include = "\\.pyi?$"
extend-exclude = "/(\n  # directories\n  \\.eggs\n  | \\.git\n  | \\.hg\n  | \\.mypy_cache\n  | \\.tox\n  | \\.venv\n  | build\n  | dist\n)/\n"

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disallow_any_unimported = false
no_implicit_optional = false
warn_redundant_casts = false
warn_unused_ignores = false
warn_no_return = false
check_untyped_defs = false
strict_optional = false
ignore_missing_imports = true
overrides = [
    { module = "tests.*", ignore_errors = true },
    { module = "scripts.*", ignore_errors = true },
]

[tool.bandit]
exclude_dirs = [
    "tests",
    "scripts",
]
skips = [
    "B101",
    "B601",
]

[tool.vermin]
targets = [
    "3.11",
]
no_tips = true
