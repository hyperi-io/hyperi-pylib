name: JFrog Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to publish (optional; defaults to current)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build & twine
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Publish to JFrog Artifactory (twine)
        env:
          # Credentials from repository secrets
          TWINE_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          # HyperSec JFrog Artifactory PyPI repository
          ARTIFACTORY_REPO_URL: https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local
        run: |
          python -m twine upload --repository-url "$ARTIFACTORY_REPO_URL" dist/*

      - name: Verify package in JFrog Artifactory
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_REPO_URL: https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local
        run: |
          # Extract package name and version from built artifacts
          PACKAGE_NAME=$(ls dist/*.whl | head -1 | sed 's/.*\///' | cut -d'-' -f1)
          PACKAGE_VERSION=$(ls dist/*.whl | head -1 | sed 's/.*\///' | cut -d'-' -f2)
          
          echo "Verifying package: ${PACKAGE_NAME}==${PACKAGE_VERSION}"
          
          # Create temporary venv for verification
          python -m venv .verify-venv
          source .verify-venv/bin/activate
          
          # Configure pip to use JFrog Artifactory
          pip config set global.index-url "${ARTIFACTORY_REPO_URL}/simple"
          pip config set global.extra-index-url "https://pypi.org/simple"
          
          # Set authentication for pip
          pip config set global.username "${ARTIFACTORY_USERNAME}"
          pip config set global.password "${ARTIFACTORY_PASSWORD}"
          
          # Attempt to install the just-published package
          echo "Installing from JFrog Artifactory..."
          pip install --no-cache-dir "${PACKAGE_NAME}==${PACKAGE_VERSION}"
          
          # Verify the package can be imported
          echo "Verifying package import..."
          python -c "import ${PACKAGE_NAME}; print(f'✓ Successfully imported {${PACKAGE_NAME}.__name__} version {${PACKAGE_NAME}.__version__}')"
          
          echo "✓ Package successfully published and verified in JFrog Artifactory"
          
          # Cleanup
          deactivate
          rm -rf .verify-venv
