name: JFrog Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to publish (optional; defaults to current)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build & twine
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Publish to JFrog Artifactory (twine)
        env:
          # Credentials from repository secrets
          TWINE_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          # HyperSec JFrog Artifactory PyPI repository
          ARTIFACTORY_REPO_URL: https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local
        run: |
          python -m twine upload --repository-url "$ARTIFACTORY_REPO_URL" dist/*

      - name: Verify package uploaded to JFrog
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Extract package name and version
          PACKAGE_NAME=$(ls dist/*.whl | head -1 | sed 's/.*\///' | cut -d'-' -f1)
          PACKAGE_VERSION=$(ls dist/*.whl | head -1 | sed 's/.*\///' | cut -d'-' -f2)

          echo "Verifying ${PACKAGE_NAME} version ${PACKAGE_VERSION} was uploaded..."

          # Check if package exists in JFrog
          curl -f -u "${ARTIFACTORY_USERNAME}:${ARTIFACTORY_PASSWORD}" \
            "https://hypersec.jfrog.io/artifactory/hypersec-pypi-local/${PACKAGE_NAME}/${PACKAGE_VERSION}/" \
            || (echo "❌ Package not found in JFrog" && exit 1)

          echo "✓ Package successfully published to JFrog Artifactory"
