name: JFrog Publish

# Triggers: MANUAL ONLY - triggered by 'ci/bootstrap publish' command
# No automatic triggers on tag pushes
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to publish (optional; defaults to current)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive  # Required for hyperci private submodule
          token: ${{ secrets.GH_PAT || github.token }}  # PAT for private submodule access

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap CI
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Create ci-local/.env with JFrog credentials
          mkdir -p ci-local
          cat > ci-local/.env << EOF
          ARTIFACTORY_USERNAME=${ARTIFACTORY_USERNAME}
          ARTIFACTORY_PASSWORD=${ARTIFACTORY_PASSWORD}
          EOF

          # Bootstrap sets up ci/.venv using ci-local/uv.lock
          ci/bootstrap --install

      - name: Build and Publish to JFrog
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Use CI build script for everything (build + publish)
          # This respects ci.yaml and uses tools from ci-local/uv.lock
          ci/.venv/bin/python ci/python/ci.d/80-build.py build
          ci/.venv/bin/python ci/python/ci.d/80-build.py publish
