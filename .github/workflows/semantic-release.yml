name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Version and Tag
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

      - name: Run semantic-release
        uses: ./ci/actions/release/semantic
        with:
          github-token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
