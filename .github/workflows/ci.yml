name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    uses: hypersec-io/ci/.github/workflows/quality.yml@main
    secrets: inherit

  build:
    name: Build
    needs: quality
    uses: hypersec-io/ci/.github/workflows/build.yml@main
    secrets: inherit
