name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v2.27.1)"

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  ci:
    uses: hyperi-io/hyperi-ci/.github/workflows/python-ci.yml@57450e1b8c4c4655259dceb23b91743ff21a283a # v2.6.1
    with:
      publish-target: oss
      tag: ${{ inputs.tag || '' }}
    secrets: inherit
