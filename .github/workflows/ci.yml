name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Detect language
        id: lang
        uses: ./ci/actions/setup/detect-language
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Setup Python
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Setup Node.js
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/setup/node
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-npm-url: ${{ vars.ARTIFACTORY_NPM_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Run Python quality checks
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/quality/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Run TypeScript quality checks
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/quality/typescript
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Skip quality (no language)
        if: steps.lang.outputs.language == 'none'
        run: echo "No project language detected - skipping quality checks"

  test:
    name: Test
    needs: quality
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Detect language
        id: lang
        uses: ./ci/actions/setup/detect-language
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Setup Python
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Setup Node.js
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/setup/node
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-npm-url: ${{ vars.ARTIFACTORY_NPM_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Run Python tests
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/test/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Skip tests (no language or no test action)
        if: steps.lang.outputs.language == 'none' || (steps.lang.outputs.language != 'python')
        run: echo "Skipping tests - no test runner available for language '${{ steps.lang.outputs.language }}'"

  build:
    name: Build
    needs: test
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Detect language
        id: lang
        uses: ./ci/actions/setup/detect-language
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Setup Python
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Setup Nuitka dependencies
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/setup/nuitka-deps

      - name: Setup Node.js
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/setup/node
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-npm-url: ${{ vars.ARTIFACTORY_NPM_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Build Python package
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/build/python/native
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Build TypeScript package
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/build/typescript
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Skip build (no language)
        if: steps.lang.outputs.language == 'none'
        run: echo "No project language detected - skipping build"

      - name: Upload artifacts
        if: steps.lang.outputs.language != 'none'
        uses: ./ci/actions/artifacts/upload
        with:
          name: build-artifacts-${{ steps.lang.outputs.language }}
