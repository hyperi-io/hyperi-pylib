name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v2.27.1)"

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  ci:
    uses: hyperi-io/hyperi-ci/.github/workflows/python-ci.yml@fd0e0aacf94ac0276d4d1b436e3ad8403d3b53cd # main
    with:
      publish-target: oss
      tag: ${{ inputs.tag || '' }}
    secrets: inherit
