name: CI Publish

# Triggers:
# - Automatic: Version tag push (v*) from ./ci/run release
# - Manual: workflow_dispatch for testing
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Read ci.yaml to determine what to build
  config:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Matrix
        id: matrix
        run: |
          pip install pyyaml
          python << 'PYEOF'
          import yaml
          import json
          import os

          # Load ci-local/ci.yaml
          with open('ci-local/ci.yaml') as f:
              config = yaml.safe_load(f)

          # Always build standard package
          # TODO: Re-enable BuildJet once access configured (buildjet-2vcpu-ubuntu-2204)
          matrix = {'include': [
              {
                  'build_type': 'standard',
                  'runner': 'ubuntu-latest',  # GitHub runners (BuildJet stalling)
                  'arch': 'any'
              }
          ]}

          # Add Nuitka builds if enabled
          nuitka = config.get('nuitka', {})
          if nuitka.get('enabled', False):
              platforms = nuitka.get('platforms', {})

              # Nuitka x64
              if platforms.get('linux_x64', True):
                  matrix['include'].append({
                      'build_type': 'nuitka',
                      'runner': 'buildjet-2vcpu-ubuntu-2204',  # BuildJet x64
                      'arch': 'x64',
                      'platform': 'linux'
                  })

              # Nuitka ARM64
              if platforms.get('linux_arm64', True):
                  matrix['include'].append({
                      'build_type': 'nuitka',
                      'runner': 'buildjet-2vcpu-ubuntu-2204-arm',  # BuildJet ARM64
                      'arch': 'arm64',
                      'platform': 'linux'
                  })

              # macOS ARM64 (expensive - opt-in only)
              if platforms.get('macos_arm64', False):
                  # Check if using Cirrus Runners (95% cheaper than GitHub)
                  cirrus = nuitka.get('cirrus', {})
                  if cirrus.get('enabled', True):
                      matrix['include'].append({
                          'build_type': 'nuitka',
                          'runner': 'ghcr.io/cirruslabs/macos-runner:sonoma',  # Cirrus macOS
                          'arch': 'arm64',
                          'platform': 'macos'
                      })
                  else:
                      matrix['include'].append({
                          'build_type': 'nuitka',
                          'runner': 'macos-latest',  # GitHub macOS (10x more expensive!)
                          'arch': 'arm64',
                          'platform': 'macos'
                      })

          # Write to output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'json={json.dumps(matrix)}\n')

          print(f"Matrix: {json.dumps(matrix, indent=2)}")
          PYEOF

  # Build and publish (matrix based on config)
  publish:
    name: Build and Publish (${{ matrix.build_type }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: config

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.config.outputs.matrix_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install C compiler (Linux)
        if: matrix.build_type == 'nuitka' && matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ python3-dev

      - name: Install C compiler (macOS)
        if: matrix.build_type == 'nuitka' && matrix.platform == 'macos'
        run: |
          xcode-select --install || true

      - name: Bootstrap CI
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Create ci-local/.env with credentials
          mkdir -p ci-local
          cat > ci-local/.env << ENVEOF
          ARTIFACTORY_USERNAME=${ARTIFACTORY_USERNAME}
          ARTIFACTORY_PASSWORD=${ARTIFACTORY_PASSWORD}
          ENVEOF

          # Bootstrap sets up ci-local/.venv with all tools from ci-local/uv.lock
          # Installs: pytest, ruff, build, twine, Nuitka (if nuitka.enabled)
          ci/bootstrap install --language python

      - name: Build and Publish
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          ARTIFACTORY_TOKEN_USER: ${{ secrets.ARTIFACTORY_TOKEN_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          CI_BUILD_TYPE: ${{ matrix.build_type }}
          CI: "true"
          GITHUB_ACTIONS: "true"
          FORCE_PUBLISH: "1"
        run: |
          # Call publish script directly (publish action removed from CLI)
          .venv/bin/python ci/modules/python/run.d/51-publish.py publish

      - name: Verify Published
        run: |
          echo "✅ Published ${{ matrix.build_type }} package (${{ matrix.arch }})"
          ls -lh dist/ || echo "dist/ cleaned after publish"

      - name: Create GitHub Release
        if: matrix.build_type == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
