name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to JFrog
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: ./ci/actions/setup/checkout
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Detect language
        id: lang
        uses: ./ci/actions/setup/detect-language
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Setup Python
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Setup Node.js
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/setup/node
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-npm-url: ${{ vars.ARTIFACTORY_NPM_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Build Python package
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/build/python/native
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Build TypeScript package
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/build/typescript
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}

      - name: Publish Python package
        if: steps.lang.outputs.language == 'python'
        uses: ./ci/actions/publish/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          artifactory-pypi-publish-url: ${{ vars.ARTIFACTORY_PYPI_PUBLISH_URL }}

      - name: Publish TypeScript package
        if: steps.lang.outputs.language == 'typescript' || steps.lang.outputs.language == 'javascript'
        uses: ./ci/actions/publish/typescript
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          artifactory-npm-publish-url: ${{ vars.ARTIFACTORY_NPM_PUBLISH_URL }}

      - name: Link to Linear
        if: secrets.LINEAR_API_KEY != ''
        uses: ./ci/actions/integrations/linear
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-prefixes: ${{ vars.LINEAR_PREFIXES || 'DFE' }}
