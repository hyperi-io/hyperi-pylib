name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Detect build configuration (native + Nuitka if enabled)
  # ==========================================================================
  detect:
    name: Detect Build Config
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    outputs:
      nuitka_enabled: ${{ steps.config.outputs.nuitka_enabled }}
      nuitka_platforms: ${{ steps.config.outputs.nuitka_platforms }}
      build_type: ${{ steps.config.outputs.build_type }}
      protection_profile: ${{ steps.config.outputs.protection_profile }}
      publish_binaries: ${{ steps.config.outputs.publish_binaries }}
      binaries_repo: ${{ steps.config.outputs.binaries_repo }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read build configuration
        id: config
        run: |
          # Install pyyaml via pip (avoids UV index config issues with private registries)
          pip install --quiet pyyaml
          CONFIG=$(python ${{ steps.ci-path.outputs.scripts }}/core/load-config.py)

          # Check if Nuitka is enabled
          NUITKA_ENABLED=$(echo "$CONFIG" | jq -r '.build.python.nuitka.enabled // false')
          echo "nuitka_enabled=${NUITKA_ENABLED}" >> $GITHUB_OUTPUT

          # Get Nuitka platforms as JSON array for matrix
          if [[ "$NUITKA_ENABLED" == "true" ]]; then
            PLATFORMS=$(echo "$CONFIG" | jq -c '.build.python.nuitka.platforms // ["linux-x64"]')
            echo "nuitka_platforms=${PLATFORMS}" >> $GITHUB_OUTPUT

            # Detect build type (app = CLI binary, package = compiled wheel)
            # If project has [project.scripts], it's an app
            if grep -q "\[project.scripts\]" pyproject.toml 2>/dev/null; then
              echo "build_type=app" >> $GITHUB_OUTPUT
            else
              echo "build_type=package" >> $GITHUB_OUTPUT
            fi
          else
            echo "nuitka_platforms=[]" >> $GITHUB_OUTPUT
            echo "build_type=package" >> $GITHUB_OUTPUT
          fi

          # Get binary publish destination (artifactory, github, both)
          # Can be overridden by HYPERCI_PUBLISH_BINARIES env var
          PUBLISH_BINARIES="${HYPERCI_PUBLISH_BINARIES:-$(echo "$CONFIG" | jq -r '.publish.binaries // "both"')}"
          echo "publish_binaries=${PUBLISH_BINARIES}" >> $GITHUB_OUTPUT

          # Get JFrog binary repository name
          # Priority: HYPERCI_BINARIES_REPO env > config file > default
          BINARIES_REPO="${HYPERCI_BINARIES_REPO:-$(echo "$CONFIG" | jq -r '.publish.binaries_repo // "hypersec-binaries"')}"
          echo "binaries_repo=${BINARIES_REPO}" >> $GITHUB_OUTPUT

          # Get Nuitka protection profile (none, data-hiding, recommended, anti-debugger, maximum)
          PROTECTION_PROFILE=$(echo "$CONFIG" | jq -r '.build.python.nuitka.protection_profile // "maximum"')
          echo "protection_profile=${PROTECTION_PROFILE}" >> $GITHUB_OUTPUT

          echo "=== Build Configuration ==="
          echo "Nuitka enabled: ${NUITKA_ENABLED}"
          echo "Nuitka platforms: $(echo "$CONFIG" | jq -r '.build.python.nuitka.platforms // []')"
          echo "Protection profile: ${PROTECTION_PROFILE}"
          echo "Publish binaries: ${PUBLISH_BINARIES}"
          echo "Binaries repo: ${BINARIES_REPO}"

  # ==========================================================================
  # Build native Python wheel (always runs)
  # ==========================================================================
  build-native:
    name: Build Native Wheel
    needs: detect
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Setup Python
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Build native package
        uses: ./ci/actions/build/python/native
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-native
          path: dist/
          retention-days: 1

  # ==========================================================================
  # Build Nuitka compiled binaries (only if enabled in config)
  # Uses Docker for isolation and reproducibility
  # ==========================================================================
  build-nuitka:
    name: Build Nuitka (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.nuitka_enabled == 'true'
    # Select runner based on platform: macOS, ARM64 Linux, or default (x64 Linux)
    runs-on: ${{ contains(matrix.platform, 'macos') && (vars.GH_RUNNER_MACOS || 'macos-latest') || contains(matrix.platform, 'arm64') && (vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm') || (vars.GH_RUNNER_DEFAULT || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.detect.outputs.nuitka_platforms) }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Build with Nuitka (Docker)
        uses: ./ci/actions/build/python/nuitka-docker
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          platform: ${{ matrix.platform }}
          build-type: ${{ needs.detect.outputs.build_type }}
          protection-profile: ${{ needs.detect.outputs.protection_profile }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Upload Nuitka artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-nuitka-${{ matrix.platform }}
          path: |
            dist/
            dist-bin/
          retention-days: 1

  # ==========================================================================
  # Publish all artifacts to JFrog
  # ==========================================================================
  publish:
    name: Publish to JFrog
    needs: [detect, build-native, build-nuitka]
    if: always() && needs.build-native.result == 'success'
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect CI path
        id: ci-path
        uses: ./ci/actions/setup/detect-ci-path

      - name: Setup Python
        uses: ./ci/actions/setup/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-pypi-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-native
          path: dist/

      - name: Download Nuitka artifacts
        if: needs.detect.outputs.nuitka_enabled == 'true' && needs.build-nuitka.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: dist-nuitka-*
          path: nuitka-artifacts/
          merge-multiple: false

      - name: Merge Nuitka artifacts into dist
        if: needs.detect.outputs.nuitka_enabled == 'true' && needs.build-nuitka.result == 'success'
        run: |
          echo "=== Merging Nuitka artifacts ==="
          mkdir -p dist-bin
          for dir in nuitka-artifacts/dist-nuitka-*/; do
            if [[ -d "${dir}dist" ]]; then
              cp -v "${dir}dist/"* dist/ 2>/dev/null || true
            fi
            if [[ -d "${dir}dist-bin" ]]; then
              cp -v "${dir}dist-bin/"* dist-bin/ 2>/dev/null || true
            fi
          done
          echo "=== All artifacts ==="
          ls -lh dist/
          ls -lh dist-bin/ 2>/dev/null || echo "(no binaries)"

      - name: Publish packages to JFrog PyPI
        uses: ./ci/actions/publish/python
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          artifactory-pypi-publish-url: ${{ vars.ARTIFACTORY_PYPI_PUBLISH_URL }}

      - name: Publish binaries to JFrog Generic
        if: |
          needs.detect.outputs.build_type == 'app' &&
          needs.detect.outputs.nuitka_enabled == 'true' &&
          needs.build-nuitka.result == 'success' &&
          (needs.detect.outputs.publish_binaries == 'artifactory' || needs.detect.outputs.publish_binaries == 'both')
        env:
          ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL || 'hypersec.jfrog.io' }}
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          ARTIFACTORY_BINARY_URL: ${{ vars.ARTIFACTORY_BINARY_URL }}
          BINARIES_REPO_CONFIG: ${{ needs.detect.outputs.binaries_repo }}
        run: |
          # Get package name and version from pyproject.toml
          PACKAGE_NAME=$(grep -E "^name\s*=" pyproject.toml | head -1 | sed 's/.*=\s*"\([^"]*\)".*/\1/' | tr '-' '_')
          VERSION=$(grep -E "^version\s*=" pyproject.toml | head -1 | sed 's/.*=\s*"\([^"]*\)".*/\1/')

          # Determine binary repository URL
          if [[ -n "${ARTIFACTORY_BINARY_URL}" ]]; then
            # Use full URL if provided
            BASE_URL="${ARTIFACTORY_BINARY_URL}"
          else
            # Construct URL from ARTIFACTORY_URL and repo name
            BASE_URL="https://${ARTIFACTORY_URL}/artifactory/${BINARIES_REPO_CONFIG}"
          fi

          echo "=== Publishing binaries to JFrog Generic ==="
          echo "URL: ${BASE_URL}"
          echo "Package: ${PACKAGE_NAME}"
          echo "Version: ${VERSION}"

          # Upload each binary tarball using curl (no JFrog CLI needed)
          for tarball in dist-bin/*.tar.gz; do
            if [[ -f "$tarball" ]]; then
              FILENAME=$(basename "$tarball")
              UPLOAD_URL="${BASE_URL}/${PACKAGE_NAME}/${VERSION}/${FILENAME}"
              echo "Uploading: ${FILENAME}"

              # Use curl with basic auth - much faster than JFrog CLI
              HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/upload_response.txt \
                -u "${ARTIFACTORY_USERNAME}:${ARTIFACTORY_PASSWORD}" \
                -T "$tarball" \
                -H "X-Checksum-Deploy: true" \
                "${UPLOAD_URL}")

              if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
                echo "  ✓ Uploaded successfully (HTTP ${HTTP_CODE})"
              else
                echo "  ✗ Upload failed (HTTP ${HTTP_CODE})"
                cat /tmp/upload_response.txt
                exit 1
              fi
            fi
          done

          echo "=== Binaries published to JFrog ==="

      - name: Upload binaries to GitHub Release
        if: |
          needs.detect.outputs.build_type == 'app' &&
          needs.detect.outputs.nuitka_enabled == 'true' &&
          needs.build-nuitka.result == 'success' &&
          github.event_name == 'release' &&
          (needs.detect.outputs.publish_binaries == 'github' || needs.detect.outputs.publish_binaries == 'both')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-bin/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Link to Linear
        uses: ./ci/actions/integrations/linear
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-prefixes: ${{ vars.LINEAR_PREFIXES || 'DFE' }}
