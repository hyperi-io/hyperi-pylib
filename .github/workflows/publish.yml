name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect:
    name: Detect Config
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    outputs:
      nuitka_enabled: ${{ steps.config.outputs.nuitka_enabled }}
      nuitka_platforms: ${{ steps.config.outputs.nuitka_platforms }}
      build_type: ${{ steps.config.outputs.build_type }}
      protection_profile: ${{ steps.config.outputs.protection_profile }}
      publish_binaries: ${{ steps.config.outputs.publish_binaries }}
      binaries_repo: ${{ steps.config.outputs.binaries_repo }}
      s3_enabled: ${{ steps.config.outputs.s3_enabled }}
      s3_bucket: ${{ steps.config.outputs.s3_bucket }}
      s3_prefix: ${{ steps.config.outputs.s3_prefix }}
      s3_region: ${{ steps.config.outputs.s3_region }}
      container_enabled: ${{ steps.config.outputs.container_enabled }}
      container_registry: ${{ steps.config.outputs.container_registry }}
      container_dockerfile: ${{ steps.config.outputs.container_dockerfile }}
      container_context: ${{ steps.config.outputs.container_context }}
      container_platforms: ${{ steps.config.outputs.container_platforms }}
      helm_enabled: ${{ steps.config.outputs.helm_enabled }}
      helm_chart_path: ${{ steps.config.outputs.helm_chart_path }}
      helm_registry_url: ${{ steps.config.outputs.helm_registry_url }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/setup/detect-build-config
        id: config
        with:
          scripts-path: ./ci/scripts

  build-native:
    name: Build Native
    needs: detect
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/build
        with:
          language: python
          artifactory-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}

  build-nuitka:
    name: Build Nuitka (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.nuitka_enabled == 'true'
    runs-on: ${{ contains(matrix.platform, 'macos') && (vars.GH_RUNNER_MACOS || 'macos-latest') || contains(matrix.platform, 'arm64') && (vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm') || (vars.GH_RUNNER_DEFAULT || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.detect.outputs.nuitka_platforms) }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/setup/detect-ci-path
        id: ci-path
      - uses: ./ci/actions/build/python/nuitka-docker
        with:
          scripts-path: ${{ steps.ci-path.outputs.scripts }}
          platform: ${{ matrix.platform }}
          build-type: ${{ needs.detect.outputs.build_type }}
          protection-profile: ${{ needs.detect.outputs.protection_profile }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-nuitka-${{ matrix.platform }}
          path: |
            dist/
            dist-bin/
          retention-days: 1

  publish:
    name: Publish
    needs: [detect, build-native, build-nuitka]
    if: always() && needs.build-native.result == 'success'
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    permissions:
      contents: write
      packages: write   # Required for GHCR container/Helm push
      id-token: write   # Required for AWS OIDC
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/publish
        with:
          language: python
          artifactory-url: ${{ vars.ARTIFACTORY_PYPI_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          artifactory-publish-url: ${{ vars.ARTIFACTORY_PYPI_PUBLISH_URL }}
          artifactory-base-url: ${{ vars.ARTIFACTORY_URL || 'hypersec.jfrog.io' }}
          artifactory-binary-url: ${{ vars.ARTIFACTORY_BINARY_URL }}
          nuitka-enabled: ${{ needs.detect.outputs.nuitka_enabled }}
          nuitka-build-result: ${{ needs.build-nuitka.result }}
          build-type: ${{ needs.detect.outputs.build_type }}
          publish-binaries: ${{ needs.detect.outputs.publish_binaries }}
          binaries-repo: ${{ needs.detect.outputs.binaries_repo }}
          github-token: ${{ steps.token.outputs.token }}
          # S3 publishing (optional - bucket from config or vars.AWS_S3_BUCKET)
          s3-enabled: ${{ needs.detect.outputs.s3_enabled }}
          s3-role-arn: ${{ vars.AWS_S3_ROLE_ARN }}
          s3-bucket: ${{ needs.detect.outputs.s3_bucket || vars.AWS_S3_BUCKET }}
          s3-region: ${{ needs.detect.outputs.s3_region || vars.AWS_REGION || 'ap-southeast-2' }}
          s3-prefix: ${{ needs.detect.outputs.s3_prefix }}
          s3-public-url: ${{ vars.AWS_S3_DOWNLOAD_URL }}
          # Container publishing (optional - enable in .hyperi-ci.yaml)
          container-enabled: ${{ needs.detect.outputs.container_enabled }}
          container-registry: ${{ needs.detect.outputs.container_registry }}
          container-dockerfile: ${{ needs.detect.outputs.container_dockerfile }}
          container-context: ${{ needs.detect.outputs.container_context }}
          container-platforms: ${{ needs.detect.outputs.container_platforms }}
          # Helm chart publishing (optional - enable in .hyperi-ci.yaml)
          helm-enabled: ${{ needs.detect.outputs.helm_enabled }}
          helm-chart-path: ${{ needs.detect.outputs.helm_chart_path }}
          helm-registry-url: ${{ needs.detect.outputs.helm_registry_url }}
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-prefixes: ${{ vars.LINEAR_PREFIXES || 'DFE' }}
