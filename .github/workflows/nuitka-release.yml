name: Nuitka Multi-Arch Release

# Triggers: Workflow runs ONLY when needed, based on ci.yaml configuration
# The "Read Configuration" job decides whether to actually build
on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (respects ci.yaml nuitka.triggers.on_release_tags)

  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force Nuitka build (ignore ci/ci.yaml enabled flag)'
        type: boolean
        default: false
      force_publish:
        description: 'Force publish to JFrog (ignore ci/ci.yaml publish flag)'
        type: boolean
        default: false
      force_version:
        description: 'Force build even if version exists in JFrog (rebuild/overwrite)'
        type: boolean
        default: false

jobs:
  # Job 1: Read configuration and decide if we should run
  config:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version_exists: ${{ steps.version_check.outputs.version_exists }}
      publish_jfrog: ${{ steps.check.outputs.publish_jfrog }}
      protection_level: ${{ steps.check.outputs.protection_level }}
      jfrog_repo: ${{ steps.check.outputs.jfrog_repo }}
      matrix_json: ${{ steps.matrix.outputs.json }}
      total_cost: ${{ steps.cost.outputs.total }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Required for hyperci private submodule
          token: ${{ secrets.GH_PAT || github.token }}  # PAT for private submodule access

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Read ci.yaml and Check Triggers
        id: check
        run: |
          python << 'EOF'
          import yaml
          import os
          import sys

          # Load ci.yaml from project root
          with open('ci.yaml', 'r') as f:
              config = yaml.safe_load(f)

          nuitka = config.get('nuitka', {})

          # Check if Nuitka is enabled
          enabled = nuitka.get('enabled', False)
          force_build = '${{ github.event.inputs.force_build }}' == 'true'

          # Check trigger conditions
          triggers = nuitka.get('triggers', {})
          event_name = '${{ github.event_name }}'
          ref_type = '${{ github.ref_type }}'

          should_run = force_build  # Default: only if forced

          if enabled:
              # Check specific triggers
              if event_name == 'push' and ref_type == 'tag' and triggers.get('on_release_tags', True):
                  should_run = True
                  print("✓ Triggered by release tag (nuitka.triggers.on_release_tags = true)")

              elif event_name == 'push' and ref_type == 'branch' and triggers.get('on_push_to_main', False):
                  should_run = True
                  print("✓ Triggered by push to main (nuitka.triggers.on_push_to_main = true)")

              elif event_name == 'pull_request' and triggers.get('on_pull_requests', False):
                  should_run = True
                  print("✓ Triggered by PR (nuitka.triggers.on_pull_requests = true)")

              elif event_name == 'workflow_dispatch':
                  should_run = True
                  print("✓ Triggered manually (workflow_dispatch)")
          else:
              print("✗ Nuitka builds disabled (nuitka.enabled = false in ci/ci.yaml)")

          if not should_run and not force_build:
              print("")
              print("Nuitka build will be SKIPPED")
              print("Reason: Trigger condition not met or nuitka.enabled = false")
              print("")
              print("To enable, update ci/ci.yaml:")
              print("  nuitka.enabled: true")
              print(f"  nuitka.triggers.{event_name}: true")

          # Get other settings
          publish = nuitka.get('publish', {})
          publish_jfrog = str(publish.get('enabled', False)).lower()
          jfrog_repo = publish.get('repository', 'hypersec-nuitka-binaries')
          protection = nuitka.get('protection_level', 'recommended')

          # Override with workflow_dispatch inputs
          if '${{ github.event.inputs.force_publish }}' == 'true':
              publish_jfrog = 'true'
              print("⚠️  force_publish input: Will publish to JFrog regardless of config")

          # Write to GitHub output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'should_run={str(should_run).lower()}\n')
              f.write(f'publish_jfrog={publish_jfrog}\n')
              f.write(f'protection_level={protection}\n')
              f.write(f'jfrog_repo={jfrog_repo}\n')

          # Read BuildJet config for output
          buildjet_config = nuitka.get('buildjet', {})
          buildjet_enabled_str = str(buildjet_config.get('enabled', True)).lower()

          print("")
          print("Configuration:")
          print(f"  should_run: {should_run}")
          print(f"  publish_jfrog: {publish_jfrog}")
          print(f"  protection_level: {protection}")
          print(f"  jfrog_repo: {jfrog_repo}")
          print(f"  buildjet_enabled: {buildjet_enabled_str}")
          EOF

      - name: Version Check (Skip if version exists in JFrog)
        id: version_check
        if: steps.check.outputs.should_run == 'true'
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          python << 'EOF'
          import os
          import sys
          import json
          import urllib.request
          import base64
          from pathlib import Path

          # Get current version from VERSION file
          version_file = Path('VERSION')
          if version_file.exists():
              current_version = version_file.read_text().strip()
          else:
              # Fallback to git tag
              import subprocess
              result = subprocess.run(['git', 'describe', '--tags', '--abbrev=0'],
                                    capture_output=True, text=True)
              current_version = result.stdout.strip().lstrip('v')

          print(f"Current version: {current_version}")

          # Check if force_version flag is set (bypass version check)
          force_version = '${{ github.event.inputs.force_version }}' == 'true'
          if force_version:
              print("⚠️  FORCE_VERSION enabled - bypassing version check")
              print("   Will build even if version exists in JFrog (overwrite)")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('version_exists=false\n')
              sys.exit(0)

          # Query JFrog for existing versions
          username = os.environ.get('ARTIFACTORY_USERNAME')
          password = os.environ.get('ARTIFACTORY_PASSWORD')

          if not username or not password:
              print("⚠️  No JFrog credentials - cannot check version, proceeding with build")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('version_exists=false\n')
              sys.exit(0)

          url = "https://hypersec.jfrog.io/artifactory/api/storage/hypersec-pypi-local/hyperlib"
          auth_str = f"{username}:{password}"
          auth_bytes = base64.b64encode(auth_str.encode()).decode()

          try:
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Basic {auth_bytes}")

              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read())

              # Get all versions from children
              versions = []
              if 'children' in data:
                  for child in data['children']:
                      version = child['uri'].strip('/')
                      versions.append(version)

              if current_version in versions:
                  print(f"❌ Version {current_version} already exists in JFrog")
                  print(f"   Found versions: {', '.join(sorted(versions)[:5])}...")
                  print("")
                  print("Skipping build - version already published")
                  print("To publish, increment version with a new commit (feat:/fix:)")

                  # Set should_run to false
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('version_exists=true\n')
                  sys.exit(0)
              else:
                  print(f"✓ Version {current_version} is new")
                  print(f"  JFrog has: {', '.join(sorted(versions)[-3:])}")
                  print(f"  Publishing: {current_version}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('version_exists=false\n')

          except Exception as e:
              print(f"⚠️  Could not check JFrog versions: {e}")
              print("   Proceeding with build anyway")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('version_exists=false\n')
          EOF

      - name: Build Matrix
        id: matrix
        if: steps.check.outputs.should_run == 'true' && steps.version_check.outputs.version_exists != 'true'
        run: |
          python << 'EOF'
          import yaml
          import json
          import os

          with open('ci/ci.yaml', 'r') as f:
              config = yaml.safe_load(f)

          nuitka_config = config.get('nuitka', {})
          platforms = nuitka_config.get('platforms', {})
          buildjet_enabled = nuitka_config.get('buildjet', {}).get('enabled', True)  # Default: enabled
          cirrus_enabled = nuitka_config.get('cirrus', {}).get('enabled', True)  # Default: enabled
          matrix = {'include': []}

          # Linux x64
          if platforms.get('linux_x64', True):
              if buildjet_enabled:
                  print(f"✓ BuildJet enabled for Linux x64 (50% cheaper)")
                  matrix['include'].append({
                      'runner': 'buildjet-2vcpu-ubuntu-2204',  # BuildJet x64 runner
                      'platform': 'linux',
                      'arch': 'x64',
                      'cost_per_min': 0.004,  # BuildJet pricing (50% cheaper)
                      'cost_multiplier': '0.5x',
                      'estimated_time': 7
                  })
              else:
                  print(f"⚠️ BuildJet disabled - using GitHub Actions for x64 (2x more expensive)")
                  matrix['include'].append({
                      'runner': 'ubuntu-latest',  # GitHub x64 runner
                      'platform': 'linux',
                      'arch': 'x64',
                      'cost_per_min': 0.008,  # GitHub pricing
                      'cost_multiplier': '1x',
                      'estimated_time': 7
                  })

          # Linux ARM64
          if platforms.get('linux_arm64', False):
              if buildjet_enabled:
                  print(f"✓ BuildJet enabled for Linux ARM64 (enables private repo ARM64)")
                  matrix['include'].append({
                      'runner': 'buildjet-2vcpu-ubuntu-2204-arm',  # BuildJet ARM64 runner
                      'platform': 'linux',
                      'arch': 'arm64',
                      'cost_per_min': 0.004,  # BuildJet pricing
                      'cost_multiplier': '0.5x',
                      'estimated_time': 7
                  })
              else:
                  print(f"⚠️ BuildJet disabled - using GitHub Actions for ARM64 (will fail for private repos)")
                  matrix['include'].append({
                      'runner': 'ubuntu-24.04-arm',  # GitHub ARM64 runner (only works for public repos)
                      'platform': 'linux',
                      'arch': 'arm64',
                      'cost_per_min': 0.016,  # GitHub pricing for private repos (if available)
                      'cost_multiplier': '2x',
                      'estimated_time': 7
                  })

          # macOS ARM64
          if platforms.get('macos_arm64', False):
              if cirrus_enabled:
                  print(f"✓ Cirrus Runners enabled for macOS (95% cheaper than GitHub macOS)")
                  matrix['include'].append({
                      'runner': 'ghcr.io/cirruslabs/macos-runner:sonoma',  # Cirrus macOS runner
                      'platform': 'darwin',
                      'arch': 'arm64',
                      'cost_per_min': 0.015,  # Cirrus: $150/month fixed = ~$0.015/min effective (8h/5d)
                      'cost_multiplier': '3.75x',  # vs BuildJet Linux ($0.004), still cheaper than GitHub
                      'estimated_time': 7,
                      'note': 'Cirrus: 95% cheaper than GitHub macOS, but 3.75x more than Linux'
                  })
              else:
                  print(f"⚠️ Cirrus disabled - using GitHub Actions for macOS (EXPENSIVE: $0.16/min)")
                  matrix['include'].append({
                      'runner': 'macos-latest',  # GitHub macOS runner
                      'platform': 'darwin',
                      'arch': 'arm64',
                      'cost_per_min': 0.16,  # GitHub: $0.16/min (10x more than Cirrus!)
                      'cost_multiplier': '40x',  # vs BuildJet Linux ($0.004)
                      'estimated_time': 7,
                      'note': 'GitHub macOS: Most expensive option, use Cirrus instead'
                  })

          matrix_json = json.dumps(matrix)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'json={matrix_json}\n')

          print(f"Build matrix: {json.dumps(matrix, indent=2)}")
          print(f"Total platforms: {len(matrix['include'])}")
          EOF

      - name: Calculate Total Cost
        id: cost
        if: steps.check.outputs.should_run == 'true'
        run: |
          python << 'EOF'
          import json
          import os

          matrix = json.loads('${{ steps.matrix.outputs.json }}')
          total_cost = sum(item['cost_per_min'] * item['estimated_time'] for item in matrix['include'])

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'total={total_cost:.2f}\n')

          print("")
          print("╔════════════════════════════════════════════════════════════════════════╗")
          print("║                    TOTAL BUILD COST ESTIMATE                            ║")
          print("╠════════════════════════════════════════════════════════════════════════╣")
          for item in matrix['include']:
              cost = item['cost_per_min'] * item['estimated_time']
              plat = f"{item['platform']}-{item['arch']}"
              runner_type = "BuildJet" if "buildjet" in item['runner'] else "GitHub"
              print(f"║ {plat:20} │ {item['estimated_time']} min │ ${item['cost_per_min']:.3f}/min │ ${cost:.2f} ({runner_type:>8}) ║")
          print("╠════════════════════════════════════════════════════════════════════════╣")
          print(f"║ TOTAL ESTIMATED COST: ${total_cost:.2f}".ljust(73) + "║")
          print("╚════════════════════════════════════════════════════════════════════════╝")
          print("")
          EOF

  # Job 2: Build Nuitka binaries for each platform (parallel matrix)
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: config
    if: needs.config.outputs.should_run == 'true' && needs.config.outputs.version_exists != 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.config.outputs.matrix_json) }}

    steps:
      - name: Build Info
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  Building: ${{ matrix.platform }}-${{ matrix.arch }}"
          echo "  Runner: ${{ matrix.runner }}"

          # Detect runner provider
          if [[ "${{ matrix.runner }}" == buildjet-* ]]; then
            echo "  Provider: BuildJet (50% cheaper than GitHub)"
          elif [[ "${{ matrix.runner }}" == ghcr.io/cirruslabs/* ]]; then
            echo "  Provider: Cirrus Runners (95% cheaper than GitHub macOS)"
            echo "  Note: Still 3.75x more expensive than Linux BuildJet"
          else
            echo "  Provider: GitHub Actions"
          fi

          echo "  Protection: ${{ needs.config.outputs.protection_level }}"
          echo "  Cost: \$${{ matrix.cost_per_min }}/min (${{ matrix.cost_multiplier }} vs BuildJet Linux)"
          echo "════════════════════════════════════════════════════════════════"

          if [ "${{ matrix.platform }}" = "darwin" ]; then
            if [[ "${{ matrix.runner }}" == ghcr.io/cirruslabs/* ]]; then
              echo ""
              echo "⚡ macOS Build with Cirrus: ~\$0.11 per build (7 min)"
              echo "   95% cheaper than GitHub macOS (\$1.12/build)"
              echo "   Still 3.75x more than Linux BuildJet (\$0.028/build)"
              echo ""
            else
              echo ""
              echo "⚠️⚠️⚠️  WARNING: GitHub macOS costs ~\$1.12 per build  ⚠️⚠️⚠️"
              echo "   Use Cirrus Runners for 95% savings!"
              echo ""
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive  # Required for hyperci private submodule
          token: ${{ secrets.GH_PAT || github.token }}  # PAT for private submodule access

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install C compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ python3-dev

      - name: Install C compiler (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      - name: Bootstrap CI Environment
        env:
          # Map organization secrets to expected env vars
          JF_USER: ${{ secrets.ARTIFACTORY_USERNAME }}
          JF_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: ./ci/bootstrap --install

      - name: Verify Nuitka Commercial (CRITICAL)
        run: |
          echo "Verifying Nuitka Commercial is installed..."
          NUITKA_VERSION=$(ci/.venv/bin/python -m nuitka --version 2>&1)

          echo "$NUITKA_VERSION"
          echo ""

          # Check if Commercial is installed (not OSS)
          if echo "$NUITKA_VERSION" | grep -q "Commercial: None"; then
            echo "================================================================"
            echo "FATAL ERROR: Open-source Nuitka detected!"
            echo "================================================================"
            echo ""
            echo "GitHub Actions MUST use Nuitka Commercial (not OSS)."
            echo ""
            echo "Installed: nuitka (OSS)"
            echo "Expected: nuitka-commercial (Commercial)"
            echo ""
            echo "This means:"
            echo "  - Bootstrap installed wrong package"
            echo "  - JFrog credentials invalid or missing"
            echo "  - nuitka-commercial not available in JFrog"
            echo ""
            echo "Action: Fix JFrog secrets or nuitka-commercial package"
            echo "================================================================"
            exit 1
          elif echo "$NUITKA_VERSION" | grep -q "Commercial:"; then
            COMMERCIAL_VER=$(echo "$NUITKA_VERSION" | grep "Commercial:" | awk '{print $2}')
            echo "✓ Nuitka Commercial verified: $COMMERCIAL_VER"
          else
            echo "WARNING: Cannot determine Nuitka type - continuing"
          fi

      - name: Build Nuitka Compiled Wheel
        env:
          # Enable Nuitka build mode
          BUILD_PROFILE: nuitka
        run: |
          echo "Building with Nuitka (auto-detects package vs app mode)..."
          echo "Protection level: ${{ needs.config.outputs.protection_level }}"
          # Use 85-build-nuitka.py which auto-detects build type from project structure
          ci/.venv/bin/python ci/python/ci.d/85-build-nuitka.py build

      - name: Verify Compiled Wheel
        run: |
          echo "Listing dist/:"
          ls -lh dist/

          # Check for compiled wheel
          WHEEL=$(ls dist/*.whl | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: No wheel found in dist/"
            exit 1
          fi

          echo "✓ Wheel found: $(basename $WHEEL)"

          # Verify it's compiled (contains .so file)
          if unzip -l "$WHEEL" | grep -q "\.so"; then
            echo "✓ Contains compiled .so file (Nuitka-compiled)"
            echo "  Architecture-specific binary included"
          else
            echo "⚠️  WARNING: No .so file found - may not be Nuitka-compiled"
          fi

          # Show wheel details
          echo ""
          echo "Wheel contents:"
          unzip -l "$WHEEL" | grep -E "\.(so|pyd)$" || echo "  No compiled files found"

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.whl
          retention-days: 90

  # Job 3: Publish to JFrog (conditional on config)
  publish-jfrog:
    name: Publish to JFrog
    runs-on: ubuntu-latest
    needs: [config, build]
    if: needs.config.outputs.publish_jfrog == 'true' && needs.config.outputs.version_exists != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Required for hyperci private submodule
          token: ${{ secrets.GH_PAT || github.token }}  # PAT for private submodule access

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List Downloaded Wheels
        run: |
          echo "Downloaded wheels:"
          find artifacts/ -type f -name "*.whl"

      - name: Install twine
        run: pip install twine

      - name: Upload Wheels to JFrog PyPI Repository
        env:
          TWINE_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          TWINE_REPOSITORY_URL: https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local
        run: |
          echo "Publishing compiled wheels to JFrog PyPI repository..."
          echo "Repository: hypersec-pypi-local"
          echo ""

          # Upload all wheels
          WHEELS=$(find artifacts/ -type f -name "*.whl")
          if [ -z "$WHEELS" ]; then
            echo "ERROR: No wheels found in artifacts/"
            exit 1
          fi

          for wheel in $WHEELS; do
            echo "Uploading: $(basename $wheel)"
            # JFrog will overwrite same version by default
            # Multi-arch wheels have unique filenames (x86_64 vs aarch64) so no conflicts
            twine upload "$wheel"
            if [ $? -eq 0 ]; then
              echo "✓ Uploaded: $(basename $wheel)"
            else
              echo "✗ Failed: $(basename $wheel)"
              exit 1
            fi
          done

          echo ""
          echo "✓ All compiled wheels published to JFrog PyPI repository"
          echo ""
          echo "Install with:"
          echo "  pip install hyperlib --index-url https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local/simple"

      - name: Build Summary
        if: always()
        run: |
          echo "## Nuitka Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.config.outputs.should_run }}" = "true" ]; then
            echo "### ✅ Builds Completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Compiled wheels built:**" >> $GITHUB_STEP_SUMMARY
            for artifact in artifacts/*/*.whl; do
              if [ -f "$artifact" ]; then
                FILENAME=$(basename "$artifact")
                SIZE=$(du -h "$artifact" | cut -f1)
                echo "- \`$FILENAME\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "**Total estimated cost:** \$${{ needs.config.outputs.total_cost }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ needs.config.outputs.publish_jfrog }}" = "true" ]; then
              echo "**Published to JFrog PyPI:** ✅" >> $GITHUB_STEP_SUMMARY
              echo "- Repository: \`hypersec-pypi-local\`" >> $GITHUB_STEP_SUMMARY
              echo "- Install: \`pip install hyperlib --index-url https://hypersec.jfrog.io/...\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Published to JFrog:** ❌ (disabled in ci/ci.yaml)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ⏭️ Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Nuitka builds are disabled or trigger condition not met." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable, update \`ci/ci.yaml\`:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
            echo "nuitka:" >> $GITHUB_STEP_SUMMARY
            echo "  enabled: true" >> $GITHUB_STEP_SUMMARY
            echo "  triggers:" >> $GITHUB_STEP_SUMMARY
            echo "    on_release_tags: true" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
