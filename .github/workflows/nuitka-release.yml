name: Nuitka Multi-Arch Release

# Triggers: MANUAL ONLY - triggered by 'ci/bootstrap publish' command
# This workflow uses ci/ scripts directly (same as local builds)
on:
  workflow_dispatch:
    inputs:
      protection_level:
        description: 'Nuitka protection level (overrides ci.yaml)'
        type: choice
        options:
          - recommended
          - data-hiding
          - traceback
          - minimal
          - none
        default: recommended

jobs:
  # Build Nuitka binaries for each platform (parallel matrix)
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 - BuildJet (50% cheaper)
          - platform: linux
            arch: x64
            runner: buildjet-2vcpu-ubuntu-2204

          # Linux ARM64 - BuildJet (enables ARM64 for private repos)
          - platform: linux
            arch: arm64
            runner: buildjet-2vcpu-ubuntu-2204-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install C compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc g++ python3-dev

      - name: Bootstrap CI
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Create ci-local/.env with JFrog credentials
          mkdir -p ci-local
          cat > ci-local/.env << EOF
          ARTIFACTORY_USERNAME=${ARTIFACTORY_USERNAME}
          ARTIFACTORY_PASSWORD=${ARTIFACTORY_PASSWORD}
          EOF

          # Bootstrap sets up ci-local/.venv using ci-local/uv.lock
          # Installs all CI tools including Nuitka from JFrog
          ci/bootstrap --install

      - name: Build Nuitka Compiled Wheel
        env:
          CI_BUILD_TYPE: nuitka
          CI_NUITKA_PROTECTION: ${{ github.event.inputs.protection_level || 'recommended' }}
        run: |
          # Use EXACT SAME script as local builds
          # This respects ci.yaml and uses tools from ci-local/uv.lock
          # 85-build-nuitka.py calls 80-build.py which builds the package,
          # then Nuitka compiles it
          ci-local/.venv/bin/python ci/python/ci.d/85-build-nuitka.py build

      - name: Verify Build
        run: |
          ls -lh dist/
          # Check for compiled wheel with .so
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: No wheel found"
            exit 1
          fi
          echo "✓ Built: $(basename $WHEEL)"
          unzip -l "$WHEEL" | grep -E "\.(so|pyd)$" && echo "✓ Contains compiled code"

      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.whl
          retention-days: 7

  # Publish all wheels to JFrog
  publish:
    name: Publish to JFrog
    runs-on: ubuntu-latest
    needs: build
    if: always()  # Run even if some builds fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Publish Nuitka Wheels to JFrog
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          # Publish the downloaded Nuitka wheels directly (don't rebuild!)
          # Use twine directly since wheels are already built
          pip install twine
          twine upload \
            --repository-url https://hypersec.jfrog.io/artifactory/api/pypi/hypersec-pypi-local \
            --username "${ARTIFACTORY_USERNAME}" \
            --password "${ARTIFACTORY_PASSWORD}" \
            dist/*

      - name: List Published Wheels
        run: |
          echo "Published wheels:"
          ls -lh dist/
