name: Local CI (disabled by default)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  local-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run local CI entrypoint
        run: |
          chmod +x scripts/ci
          ./scripts/ci
