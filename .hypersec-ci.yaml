# HyperSec CI Configuration
# Generated by: attach.sh
# Documentation: https://github.com/hypersec-io/ci/blob/main/docs/CONFIGURATION.md
#
# Configuration precedence (highest wins):
#   1. Environment variables (HYPERCI_*)
#   2. pyproject.toml [tool.hyperci] (Python projects only)
#   3. This file (.hypersec-ci.yaml)
#   4. ci/defaults.yaml (CI defaults)

# Project language (auto-detected if not specified)
# Values: python, typescript, golang, none
language: python

# Quality checks
quality:
  enabled: true

# Testing
test:
  enabled: true
  coverage: true
  # min_coverage: 80     # Fail if coverage below this percentage

# Building
build:
  enabled: true
  strategies:
    - native             # Standard wheel build
    # - nuitka           # Compiled binary (requires nuitka-commercial)

# Publishing (on release)
publish:
  enabled: true

# Python-specific settings
# These can also be set in pyproject.toml [tool.hyperci] (takes precedence)
python:
  source_dir: src        # Auto-detected if not specified
  # test:
  #   runner: pytest     # Test runner
  #   args:
  #     - "-v"
  #     - "--tb=short"
  # nuitka:              # Commercial compiled builds (optional)
  #   enabled: false
  #   platforms:
  #     - linux-x64
  #     - linux-arm64
  #   build_native: true
  #   protection_profile: recommended  # recommended, maximum

