# HyperI CI Configuration
# Generated by: attach.sh
# Documentation: https://github.com/hypersec-io/ci/blob/main/docs/CONFIGURATION.md
#
# Only set values that differ from defaults. See docs/CONFIGURATION.md for all options.

# Build type (REQUIRED for Python projects)
# Values: app (CLI/GUI binary) or package (library wheel)
build:
  type: package

# Publishing (set by attach.sh --no-publish)
publish:
  enabled: true

