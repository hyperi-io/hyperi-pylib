version: '3.8'

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: example-daemon:latest
    container_name: example-daemon
    ports:
      - "8080:8080"  # Health checks
      - "9090:9090"  # Metrics
    environment:
      - HYPERLIB_PROFILE=docker
      - LOG_LEVEL=INFO
      - DATABASE_HOST=postgres
      - QUEUE_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - daemon-network

  postgres:
    image: postgres:15-alpine
    container_name: daemon-postgres
    environment:
      - POSTGRES_USER=daemon
      - POSTGRES_PASSWORD=daemon
      - POSTGRES_DB=daemon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daemon"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - daemon-network

  redis:
    image: redis:7-alpine
    container_name: daemon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - daemon-network

  prometheus:
    image: prom/prometheus:latest
    container_name: daemon-prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - daemon-network

networks:
  daemon-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
