apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-daemon
  labels:
    app: example-daemon
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-daemon
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0  # Zero-downtime deployments
      maxSurge: 1
  template:
    metadata:
      labels:
        app: example-daemon
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: daemon
        image: example-daemon:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: health
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: HYPERLIB_PROFILE
          value: "prod"
        - name: LOG_LEVEL
          value: "INFO"
        # Example: Load config from ConfigMap
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: example-daemon-config
              key: DATABASE_HOST
              optional: true
        - name: QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: example-daemon-config
              key: QUEUE_URL
              optional: true
        # Example: Load secrets from Secret
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: example-daemon-secrets
              key: DATABASE_PASSWORD
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30  # Allow up to 150s for startup
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
