# Base configuration - lowest priority (can be overridden)
database:
  host: "localhost"
  port: 5432
  name: "myapp"
  pool_size: 5

api:
  host: "0.0.0.0"
  port: 8000
  timeout: 30
  cors_origins:
    - "http://localhost:3000"

cache:
  enabled: true
  ttl_seconds: 300
  backend: "memory"

logging:
  level: "INFO"
  format: "console"
